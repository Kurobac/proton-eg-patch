name: Build patched Proton

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday 8AM UTC
  workflow_dispatch:
    inputs:
      ge_tag:
        description: 'GE-Proton tag (e.g. GE-Proton10-34)'
        required: false
        type: string
      wine_commit:
        description: 'Wine commit SHA (auto-detected if empty)'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            flex bison \
            libasound2-dev libpulse-dev libudev-dev \
            autoconf automake libtool \
            mingw-w64 libsdl2-dev \
            python3

      - name: Determine build target
        id: target
        env:
          GE_TAG_INPUT: ${{ github.event.inputs.ge_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$GE_TAG_INPUT" ]; then
            tag="$GE_TAG_INPUT"
            echo "tag=$GE_TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            # Fetch latest GE-Proton release tag
            tag=$(curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases/latest \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "Latest GE-Proton: $tag"
          fi
          echo "tag_name=$(echo "$tag" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Get wine commit
        id: wine
        env:
          GE_TAG: ${{ steps.target.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.wine_commit }}" ]; then
            commit="${{ github.event.inputs.wine_commit }}"
            echo "commit=${{ github.event.inputs.wine_commit }}" >> "$GITHUB_OUTPUT"
          else
            commit=$(curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/GloriousEggroll/proton-ge-custom/git/trees/$GE_TAG" \
              | python3 -c "import json,sys; [print(i['sha']) for i in json.load(sys.stdin)['tree'] if i['path']=='wine']")
            echo "commit=$commit" >> "$GITHUB_OUTPUT"
          fi
          echo "Wine commit: $commit"

      - name: Cache wine build
        uses: actions/cache@v4
        id: cache-wine
        with:
          path: build/wine-build-${{ steps.wine.outputs.commit }}
          key: wine-${{ steps.wine.outputs.commit }}-${{ hashFiles('patches/*.patch') }}

      - name: Build
        run: ./build.sh "$GE_TAG" "$WINE_COMMIT"
        env:
          GE_TAG: ${{ steps.target.outputs.tag }}
          WINE_COMMIT: ${{ steps.wine.outputs.commit }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Package patch files
        run: |
          cd "build/wine-build-$WINE_COMMIT"
          mkdir -p proton-patch
          cp dlls/winebus.sys/x86_64-windows/winebus.sys proton-patch/
          cp dlls/winebus.sys/winebus.so proton-patch/
          cp dlls/winepulse.drv/winepulse.so proton-patch/
          cp dlls/winealsa.drv/winealsa.so proton-patch/
          tar czf proton-patch.tar.gz proton-patch
          ls -lh proton-patch.tar.gz
        env:
          WINE_COMMIT: ${{ steps.wine.outputs.commit }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag_name }}
          name: "${{ steps.target.outputs.tag }}-eg (edgemap patched)"
          files: |
            build/*-eg.tar.gz
            build/wine-build-${{ steps.wine.outputs.commit }}/proton-patch.tar.gz
        env:
          GITHUB_TOKEN: ${{ github.token }}
